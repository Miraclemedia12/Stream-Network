<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay For Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .card-bg {
            background-color: #161b22;
            border: 1px solid #30363d;
        }
        .neon-yellow { color: #ccff00; }
        .bg-neon { background-color: #ccff00; color: #000; }
        .copy-btn {
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            transition: color 0.2s;
        }
        .copy-btn:hover { color: #ccff00; }
        .input-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .audio-player {
            background: #1c2128;
            border: 1px solid #ccff0044;
            border-radius: 12px;
            padding: 15px;
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md mt-8 text-center">
        <!-- Logo Icon -->
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full border-4 border-neon-yellow mb-6">
            <i class="fas fa-dollar-sign text-4xl neon-yellow"></i>
        </div>

        <h1 class="text-3xl font-black mb-2">Pay For Stream</h1>
        <p class="text-gray-400 text-sm mb-4 px-6">Proceed to your bank app to complete this transaction.</p>
        
        <p class="text-yellow-500 font-bold text-xs mb-6 uppercase tracking-wider">
            <i class="fas fa-exclamation-triangle"></i> NOTE: DO NOT PAY WITH OPAY
        </p>

        <!-- Audio Instruction -->
        <div class="audio-player mb-8">
            <p class="text-[10px] neon-yellow font-bold uppercase mb-2 flex items-center justify-center gap-2">
                <i class="fas fa-volume-up"></i> Listen: How it works
            </p>
            <audio controls class="w-full h-8">
                <source src="instruction.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <!-- Bank Details (Dynamic via Firebase) -->
        <div class="space-y-3 text-left">
            <div class="text-xs text-gray-500 ml-1 mb-1">Account Number</div>
            <div class="input-box">
                <span id="acc-num" class="text-xl font-black tracking-widest">Loading...</span>
                <button class="copy-btn" onclick="copyText('acc-num')"><i class="far fa-copy text-lg"></i></button>
            </div>

            <div class="text-xs text-gray-500 ml-1 mb-1">Bank Name</div>
            <div class="input-box">
                <span id="bank-name" class="font-bold">Loading...</span>
                <button class="copy-btn" onclick="copyText('bank-name')"><i class="far fa-copy"></i></button>
            </div>

            <div class="text-xs text-gray-500 ml-1 mb-1">Account Name</div>
            <div class="input-box">
                <span id="acc-name" class="font-bold">Loading...</span>
                <button class="copy-btn" onclick="copyText('acc-name')"><i class="far fa-copy"></i></button>
            </div>

            <div class="text-xs text-gray-500 ml-1 mb-1">Amount to Pay</div>
            <div class="input-box border-2 border-neon-yellow/50">
                <span id="amount" class="text-2xl font-black neon-yellow">Loading...</span>
                <button class="copy-btn" onclick="copyText('amount')"><i class="far fa-copy neon-yellow"></i></button>
            </div>
        </div>

        <!-- Timer -->
        <div class="mt-8 bg-yellow-900/20 p-4 rounded-xl border border-yellow-700/30">
            <p class="text-yellow-600 text-xs font-bold uppercase mb-1">This payment details will expire in:</p>
            <div id="timer" class="text-2xl font-black neon-yellow">30:00</div>
        </div>

        <!-- Action Button -->
        <button id="pay-btn" onclick="handlePaid()" class="w-full bg-neon mt-8 py-4 rounded-xl font-black flex items-center justify-center gap-3 text-lg uppercase shadow-xl shadow-lime-500/10">
            <i class="fas fa-check-circle"></i> I Have Paid
        </button>

        <footer class="mt-12 pb-8 flex justify-center items-center gap-2 text-gray-500 text-sm">
            <i class="fab fa-whatsapp text-xl"></i>
            <span class="font-bold">Join our Channel</span>
        </footer>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration (Provided by env)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let redirectLink = "https://t.me/stream_support"; // Default fallback

        // Auth Logic (Rule 3)
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Fetch Settings (Rule 1 Path)
                const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'paymentSettings');
                
                onSnapshot(settingsDoc, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById('acc-num').innerText = data.accountNumber || "8052839670";
                        document.getElementById('bank-name').innerText = data.bankName || "Moniepoint MFB";
                        document.getElementById('acc-name').innerText = data.accountName || "V Media";
                        document.getElementById('amount').innerText = `₦${data.amount || "12,000"}`;
                        redirectLink = data.telegramLink || redirectLink;
                    }
                }, (error) => console.error("Firestore error:", error));
            }
        });

        // 30 Minute Countdown
        let time = 30 * 60;
        const timerEl = document.getElementById('timer');

        const updateTimer = () => {
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            timerEl.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            if (time > 0) time--;
        };

        setInterval(updateTimer, 1000);

        // Global functions
        window.copyText = (id) => {
            const text = document.getElementById(id).innerText;
            const tempInput = document.createElement("input");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            // Visual Feedback
            const btn = document.querySelector(`[onclick="copyText('${id}')"]`);
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check neon-yellow"></i>';
            setTimeout(() => btn.innerHTML = originalIcon, 2000);
        };

        window.handlePaid = () => {
            window.location.href = redirectLink;
        };
    </script>
</body>
</html>
