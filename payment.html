<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream | Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0d1117; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .neon-yellow { color: #ccff00; }
        .bg-neon { background-color: #ccff00; color: #000; }
        .input-card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 18px; margin-bottom: 12px; transition: border-color 0.3s; }
        .input-card:active { border-color: #ccff00; }
        
        #trust-notif {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #161b22; border-left: 4px solid #ccff00; padding: 14px;
            border-radius: 12px; width: 92%; max-width: 350px; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1000; display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.7);
        }
        #trust-notif.show { bottom: 25px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md mt-6 text-center">
        <!-- Brand Identity -->
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl border-4 border-neon-yellow mb-6 rotate-3">
            <i class="fas fa-bolt text-4xl neon-yellow"></i>
        </div>

        <h1 class="text-3xl font-black mb-2 tracking-tight">Pay For Stream</h1>
        <p class="text-gray-400 text-sm mb-6 px-6 leading-relaxed">Transfer the exact amount to the account below to activate your access.</p>
        
        <div class="bg-yellow-500/10 border border-yellow-500/20 py-2 px-4 rounded-full inline-flex items-center gap-2 mb-8">
            <i class="fas fa-shield-check text-yellow-500 text-xs"></i>
            <span class="text-yellow-500 font-bold text-[10px] uppercase tracking-widest">Secured by Stream Gateway</span>
        </div>

        <!-- Details Sections -->
        <div class="space-y-1 text-left">
            <label class="text-[10px] text-gray-500 font-black ml-2 uppercase tracking-tighter">Bank Account Number</label>
            <div class="input-card flex justify-between items-center">
                <span id="acc-num" class="text-2xl font-black tracking-[0.2em]">8052839670</span>
                <button onclick="copyData('acc-num')" class="p-2"><i class="far fa-copy text-gray-500 text-lg"></i></button>
            </div>

            <label class="text-[10px] text-gray-500 font-black ml-2 uppercase tracking-tighter">Financial Institution</label>
            <div class="input-card flex justify-between items-center">
                <span id="bank-name" class="font-bold text-lg">Moniepoint MFB</span>
                <button onclick="copyData('bank-name')" class="p-2"><i class="far fa-copy text-gray-500 text-lg"></i></button>
            </div>

            <label class="text-[10px] text-gray-500 font-black ml-2 uppercase tracking-tighter">Account Name</label>
            <div class="input-card flex justify-between items-center">
                <span id="acc-name" class="font-bold text-sm">V Media Limited</span>
                <button onclick="copyData('acc-name')" class="p-2"><i class="far fa-copy text-gray-500 text-lg"></i></button>
            </div>

            <label class="text-[10px] text-gray-500 font-black ml-2 uppercase tracking-tighter">Activation Fee</label>
            <div class="input-card border-2 border-neon-yellow/40 flex justify-between items-center">
                <span id="amount" class="text-3xl font-black neon-yellow">₦12,500</span>
                <button onclick="copyData('amount')" class="p-2"><i class="far fa-copy neon-yellow text-lg"></i></button>
            </div>
        </div>

        <!-- Timer & Confirmation -->
        <div class="mt-8 flex items-center justify-between px-2">
            <div class="text-left">
                <p class="text-gray-500 text-[10px] font-bold uppercase">Expires In</p>
                <p id="timer" class="text-2xl font-black neon-yellow">30:00</p>
            </div>
            <div class="text-right">
                <p class="text-red-500 text-[9px] font-black uppercase">Note</p>
                <p class="text-white text-[10px] font-bold">No Opay/Palmpay</p>
            </div>
        </div>

        <button onclick="confirmPayment()" class="w-full bg-neon mt-8 py-5 rounded-2xl font-black flex items-center justify-center gap-3 text-lg uppercase shadow-2xl shadow-lime-500/20 active:scale-95 transition-all">
            I HAVE PAID<i class="fas fa-arrow-right"></i>
        </button>

        <p class="mt-10 text-gray-600 text-[11px] font-bold uppercase tracking-widest flex items-center justify-center gap-2">
            <i class="fab fa-whatsapp"></i> Stream Support Community
        </p>
    </div>

    <!-- Live Social Proof Toast -->
    <div id="trust-notif">
        <div class="w-12 h-12 rounded-xl bg-neon flex items-center justify-center text-black flex-shrink-0">
            <i id="notif-icon" class="fas fa-check-double"></i>
        </div>
        <div class="flex-grow">
            <p id="notif-text" class="text-[12px] text-gray-200 leading-tight">...</p>
            <p class="text-[9px] text-gray-500 font-black mt-1 uppercase tracking-widest">Just Now • Verified</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIMhc1FPvv2J1crNngZe185muphsDBptY",
            authDomain: "stream-web-9b268.firebaseapp.com",
            projectId: "stream-web-9b268",
            storageBucket: "stream-web-9b268.firebasestorage.app",
            messagingSenderId: "2861676032",
            appId: "1:2861676032:web:26a684aeca4ef2913b8ae5",
            measurementId: "G-89Q05YB2RY"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let redirectUrl = "https://t.me/stream_support";

        // Real-time synchronization
        async function connect() {
            try {
                await signInAnonymously(auth);
                onSnapshot(doc(db, 'system', 'payment_details'), (snap) => {
                    if(snap.exists()){
                        const d = snap.data();
                        document.getElementById('acc-num').innerText = d.accNum || "8052839670";
                        document.getElementById('bank-name').innerText = d.bank || "Moniepoint MFB";
                        document.getElementById('acc-name').innerText = d.name || "V Media Limited";
                        document.getElementById('amount').innerText = d.amount ? `₦${d.amount}` : "₦12,500";
                        redirectUrl = d.link || redirectUrl;
                    }
                });
            } catch (e) { console.error("Database connection failed", e); }
        }
        connect();

        window.copyData = (id) => {
            const text = document.getElementById(id).innerText.replace('₦','');
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard");
        };

        window.confirmPayment = () => { window.location.href = redirectUrl; };

        // Countdown Timer
        let seconds = 1800;
        setInterval(() => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (seconds > 0) seconds--;
        }, 1000);

        // Dynamic Proof Logic
        const users = ["Segun", "Chiamaka", "Damilola", "Ibrahim", "Blessing", "Emeka", "Fatima"];
        function showProof() {
            const name = users[Math.floor(Math.random() * users.length)];
            const isWithdraw = Math.random() > 0.6;
            const msg = isWithdraw ? 
                `<b>${name}</b> just withdrew <b>₦${Math.floor(Math.random()*40+10)},500</b> to bank` : 
                `<b>${name}</b> successfully activated <b>Premium Access</b>`;
            
            document.getElementById('notif-icon').className = isWithdraw ? "fas fa-university" : "fas fa-user-check";
            document.getElementById('notif-text').innerHTML = msg;
            
            const toast = document.getElementById('trust-notif');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 5000);
            setTimeout(showProof, 18000);
        }
        setTimeout(showProof, 4000);
    </script>
</body>
</html>
