<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream | Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: linear-gradient(180deg, #bfa34b 0%, #8e742a 100%); font-family: 'Inter', sans-serif; color: white; min-height: 100vh; padding: 20px; }
        .payment-container { max-width: 400px; margin: auto; }
        .card { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 25px; margin-bottom: 20px; }
        .timer-box { background: rgba(204, 255, 0, 0.1); border: 1px dashed #ccff00; padding: 10px; border-radius: 12px; text-align: center; color: #ccff00; font-weight: 900; font-size: 22px; }
        .neon-yellow { color: #ccff00; }
        .btn-paid { width: 100%; background: #ccff00; color: black; font-weight: 900; padding: 18px; border-radius: 18px; text-transform: uppercase; margin-top: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body>

<div class="payment-container">
    <div class="flex justify-center mb-6"><img src="logo.png" class="h-8"></div>

    <div class="card">
        <p class="text-center text-[10px] font-black uppercase mb-2 tracking-widest opacity-70">Payment Window Closes In:</p>
        <div id="timer" class="timer-box italic">20:00</div>
    </div>

    <div class="card">
        <h3 class="text-sm font-black mb-4 flex items-center gap-2 italic">
            <i class="fa-solid fa-bank neon-yellow"></i> PAYMENT DETAILS
        </h3>
        <div class="space-y-4 text-sm">
            <div>
                <p class="text-[10px] uppercase opacity-50 font-bold">Bank Name</p>
                <p id="bank-name" class="font-bold text-lg">Loading...</p>
            </div>
            <div>
                <p class="text-[10px] uppercase opacity-50 font-bold">Account Number</p>
                <div class="flex justify-between items-center">
                    <p id="account-num" class="font-black text-xl tracking-wider">Loading...</p>
                    <button onclick="copyAcc()" class="text-[10px] bg-white/10 px-3 py-1 rounded-md">COPY</button>
                </div>
            </div>
            <div>
                <p class="text-[10px] uppercase opacity-50 font-bold">Account Name</p>
                <p id="account-name" class="font-bold">Loading...</p>
            </div>
        </div>
    </div>

    <div class="card py-4 text-center">
        <p class="text-[10px] font-bold uppercase mb-3 opacity-60">Listen to Instructions</p>
        <audio controls class="w-full h-8 opacity-80">
            <source src="instruction.mp3" type="audio/mpeg">
        </audio>
    </div>

    <button class="btn-paid italic" id="payButton">I Have Paid</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCkgorFG60krBLmsTVwQYstWCcskaQseBo",
    authDomain: "stream-network-e020d.firebaseapp.com",
    projectId: "stream-network-e020d",
    storageBucket: "stream-network-e020d.firebasestorage.app",
    messagingSenderId: "1040435649935",
    appId: "1:1040435649935:web:b196efc160942b7e56bffa"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // REFERENCES TO DATA
  const accountRef = ref(db, 'admin/accountDetails');
  const redirectRef = ref(db, 'admin/redirectLink');

  let currentRedirectLink = "#";

  // 1. Live Listen for Account Details
  onValue(accountRef, (snapshot) => {
    const data = snapshot.val();
    if(data) {
        document.getElementById('bank-name').innerText = data.bank;
        document.getElementById('account-num').innerText = data.number;
        document.getElementById('account-name').innerText = data.name;
    }
  });

  // 2. Live Listen for Redirect Link
  onValue(redirectRef, (snapshot) => {
    currentRedirectLink = snapshot.val();
  });

  // 3. Handle "I Have Paid" Button
  document.getElementById('payButton').addEventListener('click', () => {
      if(currentRedirectLink && currentRedirectLink !== "#") {
          window.location.href = currentRedirectLink;
      } else {
          alert("Verifying payment... Please wait 60 seconds.");
      }
  });

</script>

<script>
    // 20 Minute Timer
    let time = 20 * 60;
    setInterval(() => {
        let min = Math.floor(time / 60);
        let sec = time % 60;
        document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
        if(time > 0) time--;
    }, 1000);

    function copyAcc() {
        const num = document.getElementById('account-num').innerText;
        navigator.clipboard.writeText(num);
        alert("Account number copied!");
    }
</script>

</body>
</html>
