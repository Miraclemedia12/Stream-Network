<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .input-group label { display: block; font-size: 10px; font-weight: bold; color: #555; text-transform: uppercase; margin-bottom: 4px; margin-left: 4px; }
        input { background: #161b22 !important; border: 1px solid #333 !important; color: white !important; width: 100%; padding: 14px; border-radius: 10px; margin-bottom: 20px; outline: none; }
        input:focus { border-color: #ccff00 !important; }
        .btn-neon { background: #ccff00; color: #000; font-weight: 900; }
    </style>
</head>
<body class="p-6 flex flex-col items-center">
    <!-- Simple Login -->
    <div id="login-form" class="mt-20 w-full max-w-xs text-center">
        <h1 class="text-2xl font-black mb-8 text-lime-400 tracking-tighter">STREAM ADMIN</h1>
        <input type="password" id="admin-pass" placeholder="Access Password">
        <button onclick="handleLogin()" class="w-full btn-neon py-4 rounded-xl uppercase tracking-widest">Login</button>
    </div>

    <!-- Manager UI -->
    <div id="admin-dash" class="hidden w-full max-w-md">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-xl font-black text-lime-400">DATABASE CONTROL</h1>
            <button onclick="location.reload()" class="text-xs text-red-500 font-bold uppercase">Exit</button>
        </header>

        <div class="bg-[#111] p-6 rounded-2xl border border-[#222] shadow-2xl">
            <div class="input-group">
                <label>Bank Account Number</label>
                <input type="text" id="db-acc" placeholder="8052839670">
            </div>
            <div class="input-group">
                <label>Bank Institution Name</label>
                <input type="text" id="db-bank" placeholder="Moniepoint">
            </div>
            <div class="input-group">
                <label>Account Holder Name</label>
                <input type="text" id="db-name" placeholder="V Media">
            </div>
            <div class="input-group">
                <label>Subscription Amount (e.g. 12,000)</label>
                <input type="text" id="db-amt" placeholder="12,000">
            </div>
            <div class="input-group">
                <label>Redirect URL (Support Link)</label>
                <input type="text" id="db-link" placeholder="https://t.me/...">
            </div>

            <button id="save-btn" onclick="saveData()" class="w-full btn-neon py-5 rounded-xl uppercase tracking-widest shadow-lg shadow-lime-500/10">
                Update Live Details
            </button>
            <p id="status" class="text-center text-xs mt-6 font-bold uppercase"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkgorFG60krBLmsTVwQYstWCcskaQseBo",
            authDomain: "stream-network-e020d.firebaseapp.com",
            projectId: "stream-network-e020d",
            storageBucket: "stream-network-e020d.firebasestorage.app",
            messagingSenderId: "1040435649935",
            appId: "1:1040435649935:web:b196efc160942b7e56bffa",
            measurementId: "G-0W2LJZ2R3Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.handleLogin = async () => {
            if(document.getElementById('admin-pass').value === "stream2026") {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('admin-dash').classList.remove('hidden');
                
                // Authorize for write access
                await signInAnonymously(auth);
                
                // Pre-load current data
                const s = await getDoc(doc(db, 'settings', 'live_details'));
                if(s.exists()){
                    const d = s.data();
                    document.getElementById('db-acc').value = d.accNum || "";
                    document.getElementById('db-bank').value = d.bank || "";
                    document.getElementById('db-name').value = d.name || "";
                    document.getElementById('db-amt').value = d.amount || "";
                    document.getElementById('db-link').value = d.link || "";
                }
            } else { alert("Access Denied"); }
        };

        window.saveData = async () => {
            const btn = document.getElementById('save-btn');
            const st = document.getElementById('status');
            btn.innerText = "CONNECTING...";
            btn.disabled = true;

            try {
                await setDoc(doc(db, 'settings', 'live_details'), {
                    accNum: document.getElementById('db-acc').value,
                    bank: document.getElementById('db-bank').value,
                    name: document.getElementById('db-name').value,
                    amount: document.getElementById('db-amt').value,
                    link: document.getElementById('db-link').value,
                    updatedAt: new Date().toISOString()
                });
                st.innerText = "SUCCESS: DATABASE UPDATED";
                st.className = "text-center text-xs mt-6 font-bold uppercase text-green-500";
            } catch (e) {
                st.innerText = "ERROR: " + e.message;
                st.className = "text-center text-xs mt-6 font-bold uppercase text-red-500";
                console.error(e);
            } finally {
                btn.innerText = "Update Live Details";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
