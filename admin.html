<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream | Secure Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(12px); border: 1px solid #222; border-radius: 24px; }
        .neon-focus:focus-within { border-color: #ccff00; box-shadow: 0 0 15px rgba(204, 255, 0, 0.1); }
        input { background: transparent !important; outline: none; width: 100%; color: white; font-weight: 600; }
        .btn-neon { background: #ccff00; color: #000; font-weight: 800; transition: all 0.3s ease; }
        .btn-neon:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(204, 255, 0, 0.25); }
        .btn-neon:disabled { opacity: 0.4; transform: none; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="w-full max-w-sm">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-fingerprint text-2xl text-lime-400"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tighter">ADMIN TERMINAL</h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mt-1">Encrypted Session Required</p>
        </div>

        <div class="glass-panel p-8 shadow-2xl">
            <div class="mb-5">
                <label class="text-[10px] font-black text-gray-600 uppercase tracking-widest ml-1">Terminal User</label>
                <div class="flex items-center gap-3 border border-white/10 rounded-xl px-4 py-3.5 mt-1 neon-focus bg-white/5">
                    <i class="fas fa-user-shield text-gray-600 text-sm"></i>
                    <input type="text" id="username" placeholder="admin" autocomplete="off">
                </div>
            </div>

            <div class="mb-8">
                <label class="text-[10px] font-black text-gray-600 uppercase tracking-widest ml-1">Access Token</label>
                <div class="flex items-center gap-3 border border-white/10 rounded-xl px-4 py-3.5 mt-1 neon-focus bg-white/5">
                    <i class="fas fa-key text-gray-600 text-sm"></i>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
            </div>

            <button onclick="handleLogin()" class="w-full btn-neon py-4 rounded-xl uppercase tracking-widest text-xs">
                Initialize Session
            </button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden-section w-full max-w-2xl">
        <div class="flex items-center justify-between mb-8 px-2">
            <div>
                <h1 class="text-2xl font-black text-white">Database Control</h1>
                <p class="text-[10px] text-lime-400 font-black uppercase tracking-[0.2em]">Connected to Stream-Web-9b268</p>
            </div>
            <button onclick="location.reload()" class="h-10 w-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center hover:text-red-500 transition-colors">
                <i class="fas fa-power-off"></i>
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Payment Data -->
            <div class="glass-panel p-6 space-y-5">
                <h3 class="text-[11px] font-black text-gray-500 uppercase border-b border-white/5 pb-3 tracking-widest">Bank Credentials</h3>
                
                <div>
                    <label class="text-[10px] font-bold text-gray-600 uppercase">Account Number</label>
                    <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5">
                        <input type="text" id="db-acc" class="text-sm">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-600 uppercase">Bank Name</label>
                    <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5">
                        <input type="text" id="db-bank" class="text-sm">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-600 uppercase">Beneficiary Name</label>
                    <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5">
                        <input type="text" id="db-name" class="text-sm">
                    </div>
                </div>
            </div>

            <!-- Pricing & Gateway -->
            <div class="glass-panel p-6 space-y-5 flex flex-col justify-between">
                <div>
                    <h3 class="text-[11px] font-black text-gray-500 uppercase border-b border-white/5 pb-3 tracking-widest">Gateway Config</h3>
                    
                    <div class="mt-5">
                        <label class="text-[10px] font-bold text-gray-600 uppercase">Price (e.g. 12,500)</label>
                        <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5">
                            <input type="text" id="db-amt" class="text-sm text-lime-400">
                        </div>
                    </div>

                    <div class="mt-5">
                        <label class="text-[10px] font-bold text-gray-600 uppercase">Redirect Link</label>
                        <div class="border border-white/10 rounded-lg px-3 py-2.5 mt-1 bg-white/5">
                            <input type="text" id="db-link" class="text-sm">
                        </div>
                    </div>
                </div>

                <button id="save-btn" onclick="saveChanges()" class="w-full btn-neon py-4 rounded-xl uppercase text-[11px] tracking-widest">
                    Apply Live Changes
                </button>
            </div>
        </div>
        
        <p id="status" class="text-center mt-8 text-[10px] font-black uppercase tracking-[0.3em] opacity-0 transition-opacity"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIMhc1FPvv2J1crNngZe185muphsDBptY",
            authDomain: "stream-web-9b268.firebaseapp.com",
            projectId: "stream-web-9b268",
            storageBucket: "stream-web-9b268.firebasestorage.app",
            messagingSenderId: "2861676032",
            appId: "1:2861676032:web:26a684aeca4ef2913b8ae5",
            measurementId: "G-89Q05YB2RY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.handleLogin = async () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if(u === "admin" && p === "stream2026") {
                document.getElementById('login-screen').classList.add('hidden-section');
                document.getElementById('dashboard').classList.remove('hidden-section');
                
                try {
                    await signInAnonymously(auth);
                    const snap = await getDoc(doc(db, 'system', 'payment_details'));
                    if(snap.exists()){
                        const d = snap.data();
                        document.getElementById('db-acc').value = d.accNum || "";
                        document.getElementById('db-bank').value = d.bank || "";
                        document.getElementById('db-name').value = d.name || "";
                        document.getElementById('db-amt').value = d.amount || "";
                        document.getElementById('db-link').value = d.link || "";
                    }
                } catch (e) { alert("Permission Error: Enable Firestore Rules"); }
            } else { alert("Access Denied"); }
        };

        window.saveChanges = async () => {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "WRITING TO CLOUD...";

            try {
                await setDoc(doc(db, 'system', 'payment_details'), {
                    accNum: document.getElementById('db-acc').value,
                    bank: document.getElementById('db-bank').value,
                    name: document.getElementById('db-name').value,
                    amount: document.getElementById('db-amt').value,
                    link: document.getElementById('db-link').value,
                    lastUpdate: new Date().toISOString()
                });
                notify("System Updated Successfully", true);
            } catch (e) {
                notify("Error: Firebase Rules Denied Access", false);
            } finally {
                btn.disabled = false;
                btn.innerText = "Apply Live Changes";
            }
        };

        function notify(m, s) {
            const el = document.getElementById('status');
            el.innerText = m;
            el.style.color = s ? "#ccff00" : "#ff4444";
            el.style.opacity = "1";
            setTimeout(() => el.style.opacity = "0", 4000);
        }
    </script>
</body>
</html>
